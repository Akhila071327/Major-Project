<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title if title else "Career Recommendation System" }}</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* SAME BACKGROUND FROM YOUR HOMEPAGE */
        body {
            background: url("https://images.unsplash.com/photo-1521790361543-f645cf042ec4?auto=format&fit=crop&w=1600&q=60")
                        no-repeat center center fixed;
            background-size: cover;
            font-family: 'Poppins', sans-serif;
            color: white;
            min-height: 100vh;
            position: relative;
        }

        /* DARK OVERLAY SAME AS YOUR HOMEPAGE */
        .page-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(3px);
            z-index: -1;
        }

        /* GLASS NAVBAR */
        .navbar-glass {
            background: rgba(255,255,255,0.10);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.3);
        }

        .nav-link {
            color: #fff !important;
            font-weight: 500;
        }

        .nav-link:hover {
            color: #ffd369 !important;
        }

        /* GLASS CONTENT BLOCK (used by all pages) */
        .glass-box {
            background: rgba(255,255,255,0.12);
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.35);
            padding: 25px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.35);
        }
    </style>
</head>

<body>

<!-- OVERLAY (IMPORTANT FOR SAME EFFECT AS HOME PAGE) -->
<div class="page-overlay"></div>

<!-- ⭐ NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-glass py-3">
  <div class="container">
    <a class="navbar-brand text-white fw-bold fs-4">Career Recommendation System</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">

        {% if session.get('username') %}
            <li class="nav-item">
                <a class="nav-link">Hi, {{ session.username }}</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="/dashboard">Dashboard</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="/profile">Profile</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="/signout">Sign Out</a>
            </li>

        {% else %}
            <li class="nav-item">
                <a class="nav-link" href="/signin">Sign In</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="/signup">Sign Up</a>
            </li>
        {% endif %}

      </ul>
    </div>
  </div>
</nav>

<!-- ⭐ CONTENT AREA -->
<div class="container my-5">
    {% block content %}
    {% endblock %}
</div>
<script>
function showToast(msg) {
    const t = document.createElement('div');
    t.innerText = msg;
    t.style.position = 'fixed';
    t.style.right = '18px';
    t.style.bottom = '18px';
    t.style.background = 'rgba(0,0,0,0.75)';
    t.style.color = 'white';
    t.style.padding = '12px 16px';
    t.style.borderRadius = '8px';
    t.style.fontSize = '15px';
    t.style.zIndex = '99999';
    t.style.boxShadow = '0 6px 20px rgba(0,0,0,0.4)';
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
