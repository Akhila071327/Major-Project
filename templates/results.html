<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recommendations</title>
</head>
<body style="font-family: Arial; margin: 20px;">
    <h2>Top Job Recommendations for {{ username }}</h2>
    {% if recs %}
        {% for r in recs %}
            <div style="border:1px solid #ccc; padding:15px; margin-bottom:15px;">
                <h3>{{ r.title }} at {{ r.company }}</h3>
                <p><b>Location:</b> {{ r.city }}</p>
                <p><b>Skills Required:</b> {{ r.skills }}</p>
                <p><b>Description:</b> {{ r.desc }}</p>
            </div>
        {% endfor %}
    {% else %}
        <p>No recommendations found for this user.</p>
    {% endif %}
    <a href="/">Back</a>
</body>
</html>
